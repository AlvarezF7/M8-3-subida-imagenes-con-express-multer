<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Subir imagen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-light">
    <header class="header-flex">
        <h1> Subiendo imagenes con Express y Multe</h1>
    </header>
    <div class="container py-5" style="max-width: 600px;">
        <h2 class="mb-4">Subir Imagen</h2>
        <form id="formUpload" class="bg-white p-4 rounded border">
            <div class="mb-3">
            <label for="inputFoto" class="form-label">
                Seleccione una imagen (jpg, jpeg, png, gif) máx. 5MB
            </label>
            <input type="file" id="inputFoto" name="foto" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Subir</button>
        </form>
    <!-- mensaje -->
    <div id="feedback" class="mt-3" style="display:none;"></div>
    </div>
    <!-- Modal para mostrar la imagen -->
    <div class="modal fade" id="imagenModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Imagen Subida</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body text-center">
                <img id="modalImage" src="" alt="Imagen subida" style="max-width:100%; border-radius:5px;">
            </div>
            </div>
        </div>
      
</div>
<footer>
          <p>&copy; Proyecto con fines educativos para curso FullStack sence 2026</p>
     </footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
